metadata:
  name: Document field extractor
  version: 1.0.0

prompts:
  extractor: |
    You are extracting structured fields from a business document.

    The text contains structured data embedded in unstructured prose. Numbers may use
    spaces instead of decimal points: "38 0" means 38.00, "1368 0" means 1368.00.

    Rules:
    - Lowercase strings unless they are proper names.
    - Dates must be ISO YYYY-MM-DD.
    - If a field is NOT in the text, omit it (do not invent).
    - For total_price: the final document total, not a per-line total.
    - For products: every product, in order.